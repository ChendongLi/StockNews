steps:
  # Build image with commit SHA and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:$COMMIT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:latest'
      - '.'

  # Push all tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews'

  # Update Cloud Run Job image (secrets/env vars set separately at job creation)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - stocknews
      - '--image=us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:$COMMIT_SHA'
      - '--region=us-west1'
      - '--project=agentlens-489006'

options:
  logging: CLOUD_LOGGING_ONLY
