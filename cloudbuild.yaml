steps:
  # Build image with commit SHA and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:$COMMIT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:latest'
      - '.'

  # Push all tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews'

  # Apply namespace first (must exist before other resources)
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/namespace.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-west1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=voicebuddy-standard'

  # Apply cronjob (secret must be created separately via kubectl — not committed to git)
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/cronjob.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-west1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=voicebuddy-standard'

options:
  logging: CLOUD_LOGGING_ONLY
