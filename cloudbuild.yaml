steps:
  # Build image with commit SHA and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:$COMMIT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews:latest'
      - '.'

  # Push all tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-west1-docker.pkg.dev/agentlens-489006/voicebuddy/stocknews'

  # Note: Cloud Run Job image update is handled separately (see README-GCP.md)
  # Cloud Build SA lacks run.jobs.update — grant roles/run.developer to
  # 1056054306065-compute@developer.gserviceaccount.com to enable auto-deploy here.

options:
  logging: CLOUD_LOGGING_ONLY
