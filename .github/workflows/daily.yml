name: Daily Stock News

on:
  # Disabled: replaced by GKE CronJob on voicebuddy-standard (see README-GCP.md)
  # schedule:
  #   # 7:45 AM PT = 15:45 UTC, Mon–Fri
  #   - cron: "45 15 * * 1-5"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  send:
    name: Fetch & Send Daily Email
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run StockNews
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('StockNews daily run failed. Check the logs above.')
